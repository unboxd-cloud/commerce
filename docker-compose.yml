services:
  mercur-db:
    image: postgres:15
    container_name: mercur-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa123
      POSTGRES_DB: medusa
    volumes:
      - mercur-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa"]
      interval: 10s
      timeout: 5s
      retries: 5

  mercur-cache:
    image: redis:7-alpine
    container_name: mercur-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mercur-backend:
    build:
      context: ./src/apps/api
      dockerfile: Dockerfile
    container_name: mercur-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgres://medusa:medusa123@mercur-db:5432/medusa
      REDIS_URL: redis://mercur-cache:6379
      NODE_ENV: development
      ADMIN_CORS: '*'
      STORE_CORS: '*'
    depends_on:
      mercur-db:
        condition: service_healthy
      mercur-cache:
        condition: service_healthy

  mercur-storefront:
    build:
      context: ./src/apps/storefront
      dockerfile: Dockerfile
    container_name: mercur-storefront
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MEDUSA_BACKEND_URL: http://mercur-backend:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_dev_placeholder
    depends_on:
      - mercur-backend

  mercur-vendor:
    build:
      context: ./src/apps/vendor-panel
      dockerfile: Dockerfile
    container_name: mercur-vendor
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_MEDUSA_BACKEND_URL: http://mercur-backend:9000
    depends_on:
      - mercur-backend

  caddy:
    image: caddy:2
    container_name: mercur-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mercur-storefront
      - mercur-backend
      - mercur-vendor

volumes:
  mercur-db:
  caddy-data:
  caddy-config:
