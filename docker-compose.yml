services:
  mercur-db:
    image: postgres:15
    container_name: mercur-db
    restart: unless-stopped
    volumes:
      - mercur-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 5

  mercur-cache:
    image: redis:7-alpine
    container_name: mercur-cache
    restart: unless-stopped
    volumes:
      - mercur-cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mercur-storefront:
    build:
      context: ./src/apps/storefront
      dockerfile: Dockerfile
    container_name: mercur-storefront
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.${PUBLIC_DOMAIN}
      NEXT_PUBLIC_BASE_URL: https://${PUBLIC_DOMAIN}

  caddy:
    image: caddy:2
    container_name: mercur-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}

volumes:
  mercur-db:
  mercur-cache:
  caddy-data:
  caddy-config:
